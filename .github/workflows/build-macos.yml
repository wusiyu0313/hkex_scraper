name: Build macOS App

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install flet-cli pyinstaller

      - name: Install Playwright Chromium runtime (sidecar)
        run: |
          export PLAYWRIGHT_BROWSERS_PATH="$GITHUB_WORKSPACE/ms-playwright"
          python -m playwright install chromium

      - name: Pack macOS app
        run: |
          flet pack ui_app.py \
            --name HKEXIOScraper \
            --add-data "config.yaml:." \
            --add-data "consultants.yaml:." \
            --add-data "scraper:scraper"

      - name: Create zip artifact (.app + sidecar browsers)
        run: |
          mkdir -p release
          cp -R dist/HKEXIOScraper.app release/
          cp -R ms-playwright release/
          cd release
          ditto -c -k --sequesterRsrc --keepParent HKEXIOScraper.app HKEXIOScraper-macos-arm64-app.zip
          ditto -c -k --sequesterRsrc --keepParent ms-playwright HKEXIOScraper-macos-arm64-browsers.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: HKEXIOScraper-macos-arm64-app
          path: release/HKEXIOScraper-macos-arm64-app.zip

      - name: Upload browsers artifact
        uses: actions/upload-artifact@v4
        with:
          name: HKEXIOScraper-macos-arm64-browsers
          path: release/HKEXIOScraper-macos-arm64-browsers.zip
